<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c0b8d" />
      <stop offset="50%" stop-color="#7f13ec" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)" />
  <g transform="translate(256, 256)">
    <path d="M-100,-100 L100,-100 L100,100 L-100,100 Z" fill="none" stroke="white" stroke-width="24" stroke-linejoin="round" opacity="0.2" transform="rotate(45)" />
    <path d="M-60,-60 L60,-60 L60,60 L-60,60 Z" fill="none" stroke="white" stroke-width="32" stroke-linejoin="round" transform="rotate(45)" filter="url(#glow)" />
    <circle cx="0" cy="0" r="24" fill="white" filter="url(#glow)" />
    <path d="M-120,0 L-80,0 M120,0 L80,0 M0,-120 L0,-80 M0,120 L0,80" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.8" />
