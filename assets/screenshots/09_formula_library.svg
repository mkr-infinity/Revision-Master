  <text x="176" y="287" fill="#e2d9f3" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">x = (−b ± √(b²−4ac)) / 2a</text>
  <text x="350" y="256" fill="#4a3570" font-family="Arial" font-size="18" text-anchor="end">★</text>

