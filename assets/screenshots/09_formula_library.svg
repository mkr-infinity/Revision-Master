  <text x="129" y="589" fill="#67e8f9" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">KE = ½mv²</text>
  <text x="350" y="558" fill="#f59e0b" font-family="Arial" font-size="18" text-anchor="end">★</text>

