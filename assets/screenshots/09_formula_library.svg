  <text x="134" y="381" fill="#e2d9f3" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">a² + b² = c²</text>
  <text x="350" y="350" fill="#f59e0b" font-family="Arial" font-size="18" text-anchor="end">★</text>

  <!-- Section header -->
