<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0b1e"/>
      <stop offset="100%" stop-color="#12091a"/>
    </linearGradient>
    <linearGradient id="purpleBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f13ec"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="pinkBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="timerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7f13ec"/>
    </linearGradient>
  </defs>

  <rect width="390" height="844" fill="url(#bgGrad)"/>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0b1e"/>
  <text x="20" y="28" fill="#e2d9f3" font-family="Arial" font-size="13" font-weight="600">9:41</text>
  <text x="330" y="28" fill="#e2d9f3" font-family="Arial" font-size="11">●●● ▲ 84%</text>

  <!-- Header -->
  <rect x="0" y="44" width="390" height="60" fill="#0f0b1e"/>
  <text x="20" y="77" fill="#a78bfa" font-family="Arial" font-size="22">←</text>
  <text x="195" y="72" fill="white" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">Mock Test</text>
  <text x="195" y="92" fill="#7c6fa8" font-family="Arial" font-size="12" text-anchor="middle">Organic Chemistry · Question 3 of 10</text>

  <!-- Timer bar -->
  <rect x="16" y="112" width="358" height="8" rx="4" fill="#2a1060"/>
  <rect x="16" y="112" width="230" height="8" rx="4" fill="url(#timerGrad)"/>

  <!-- Timer + question count row -->
  <rect x="16" y="130" width="100" height="32" rx="16" fill="#0a2040"/>
  <text x="66" y="150" fill="#67e8f9" font-family="Arial" font-size="13" font-weight="800" text-anchor="middle">⏱ 12:34</text>
  <rect x="274" y="130" width="100" height="32" rx="16" fill="#2a1060"/>
  <text x="324" y="150" fill="#a78bfa" font-family="Arial" font-size="13" font-weight="700" text-anchor="middle">3 / 10</text>

  <!-- Question card -->
  <rect x="16" y="176" width="358" height="140" rx="24" fill="#1a0d30"/>
  <rect x="16" y="176" width="358" height="140" rx="24" fill="none" stroke="#2a1555" stroke-width="1.5"/>
  <rect x="28" y="188" width="70" height="22" rx="11" fill="#2a1060"/>
  <text x="63" y="203" fill="#a78bfa" font-family="Arial" font-size="10" font-weight="700" text-anchor="middle">QUESTION 3</text>
  <text x="195" y="242" fill="white" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">Which of the following is an</text>
  <text x="195" y="265" fill="white" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">example of an ester?</text>
  <text x="195" y="292" fill="#7c6fa8" font-family="Arial" font-size="12" text-anchor="middle">Select the correct answer below</text>

  <!-- Options -->
  <!-- Option A — selected correct -->
  <rect x="16" y="330" width="358" height="60" rx="18" fill="#0e2a0e"/>
  <rect x="16" y="330" width="358" height="60" rx="18" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="48" cy="360" r="14" fill="#10b981"/>
  <text x="48" y="366" fill="white" font-family="Arial" font-size="12" font-weight="800" text-anchor="middle">A</text>
  <text x="74" y="356" fill="white" font-family="Arial" font-size="15" font-weight="700">Ethyl ethanoate (CH₃COOC₂H₅)</text>
  <text x="74" y="374" fill="#6ee7b7" font-family="Arial" font-size="11">✓ Correct — product of esterification</text>
  <text x="360" y="366" fill="#10b981" font-family="Arial" font-size="20" text-anchor="end">✓</text>

  <!-- Option B -->
  <rect x="16" y="402" width="358" height="56" rx="18" fill="#1a0d30"/>
  <rect x="16" y="402" width="358" height="56" rx="18" fill="none" stroke="#2a1555" stroke-width="1"/>
  <circle cx="48" cy="430" r="14" fill="#2a1060"/>
  <text x="48" y="436" fill="#a78bfa" font-family="Arial" font-size="12" font-weight="800" text-anchor="middle">B</text>
  <text x="74" y="434" fill="#e2d9f3" font-family="Arial" font-size="15">Ethanol (C₂H₅OH)</text>

  <!-- Option C -->
  <rect x="16" y="470" width="358" height="56" rx="18" fill="#1a0d30"/>
  <rect x="16" y="470" width="358" height="56" rx="18" fill="none" stroke="#2a1555" stroke-width="1"/>
  <circle cx="48" cy="498" r="14" fill="#2a1060"/>
  <text x="48" y="504" fill="#a78bfa" font-family="Arial" font-size="12" font-weight="800" text-anchor="middle">C</text>
  <text x="74" y="502" fill="#e2d9f3" font-family="Arial" font-size="15">Acetic acid (CH₃COOH)</text>

  <!-- Option D — wrong selected -->
  <rect x="16" y="538" width="358" height="56" rx="18" fill="#2a0808"/>
  <rect x="16" y="538" width="358" height="56" rx="18" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="48" cy="566" r="14" fill="#ef4444"/>
  <text x="48" y="572" fill="white" font-family="Arial" font-size="12" font-weight="800" text-anchor="middle">D</text>
  <text x="74" y="566" fill="#fca5a5" font-family="Arial" font-size="15">Diethyl ether (C₂H₅OC₂H₅)</text>
  <text x="360" y="570" fill="#ef4444" font-family="Arial" font-size="20" text-anchor="end">✗</text>

  <!-- AI Explain button -->
  <rect x="16" y="610" width="174" height="48" rx="16" fill="#1a0d30"/>
  <rect x="16" y="610" width="174" height="48" rx="16" fill="none" stroke="#7f13ec" stroke-width="1.5"/>
  <text x="103" y="638" fill="#a78bfa" font-family="Arial" font-size="13" font-weight="700" text-anchor="middle">✨ AI Explain</text>

  <!-- Next question button -->
  <rect x="200" y="610" width="174" height="48" rx="16" fill="url(#purpleBtn)"/>
  <text x="287" y="638" fill="white" font-family="Arial" font-size="13" font-weight="700" text-anchor="middle">Next Question →</text>

  <!-- Score so far -->
  <rect x="16" y="672" width="358" height="40" rx="12" fill="#1a0d30"/>
  <text x="30" y="697" fill="#7c6fa8" font-family="Arial" font-size="12">Score so far:</text>
  <text x="116" y="697" fill="#10b981" font-family="Arial" font-size="13" font-weight="700">2 correct</text>
  <text x="174" y="697" fill="#4a3570" font-family="Arial" font-size="12">·</text>
  <text x="184" y="697" fill="#ef4444" font-family="Arial" font-size="13" font-weight="700">0 wrong</text>
  <text x="246" y="697" fill="#4a3570" font-family="Arial" font-size="12">·</text>
  <text x="256" y="697" fill="#f97316" font-family="Arial" font-size="13" font-weight="700">1 skipped</text>

  <!-- Bottom Nav -->
  <rect x="0" y="756" width="390" height="88" fill="#0f0b1e"/>
  <rect x="0" y="756" width="390" height="1" fill="#2a1555"/>
  <rect x="24" y="760" width="342" height="56" rx="28" fill="#1a0d30"/>
  <rect x="24" y="760" width="342" height="56" rx="28" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="70" y="785" font-family="Arial" font-size="18" text-anchor="middle">🏠</text>
  <text x="70" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Home</text>
  <text x="133" y="785" font-family="Arial" font-size="18" text-anchor="middle">📚</text>
  <text x="133" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Cards</text>
  <rect x="174" y="764" width="80" height="48" rx="24" fill="url(#purpleBtn)"/>
  <text x="214" y="787" font-family="Arial" font-size="18" text-anchor="middle">📝</text>
  <text x="214" y="804" fill="white" font-family="Arial" font-size="9" font-weight="700" text-anchor="middle">Tests</text>
  <text x="276" y="785" font-family="Arial" font-size="18" text-anchor="middle">📊</text>
  <text x="276" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Stats</text>
  <text x="338" y="785" font-family="Arial" font-size="18" text-anchor="middle">⚙️</text>
  <text x="338" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Settings</text>
  <rect x="165" y="836" width="60" height="4" rx="2" fill="#3a2060"/>
</svg>
