<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0b1e"/>
      <stop offset="100%" stop-color="#12091a"/>
    </linearGradient>
    <linearGradient id="purpleBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f13ec"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="aiMsgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e0a40"/>
      <stop offset="100%" stop-color="#2a106a"/>
    </linearGradient>
    <linearGradient id="userMsgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f13ec"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="390" height="844" fill="url(#bgGrad)"/>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0b1e"/>
  <text x="20" y="28" fill="#e2d9f3" font-family="Arial" font-size="13" font-weight="600">9:41</text>
  <text x="330" y="28" fill="#e2d9f3" font-family="Arial" font-size="11">●●● ▲ 84%</text>

  <!-- Header -->
  <rect x="0" y="44" width="390" height="68" fill="#0f0b1e"/>
  <text x="20" y="77" fill="#a78bfa" font-family="Arial" font-size="22">←</text>
  <circle cx="76" cy="74" r="20" fill="url(#purpleBtn)"/>
  <text x="76" y="81" font-family="Arial" font-size="20" text-anchor="middle">✨</text>
  <text x="106" y="70" fill="white" font-family="Arial" font-size="16" font-weight="700">MKR AI</text>
  <text x="106" y="88" fill="#a78bfa" font-family="Arial" font-size="11">● Online · Powered by Gemini</text>
  <!-- Options -->
  <text x="370" y="77" fill="#a78bfa" font-family="Arial" font-size="20" text-anchor="middle">⋯</text>

  <!-- Subject badge -->
  <rect x="16" y="120" width="358" height="34" rx="17" fill="#1a0d30"/>
  <text x="195" y="141" fill="#7c6fa8" font-family="Arial" font-size="12" text-anchor="middle">Studying: <tspan fill="#a78bfa" font-weight="700">Organic Chemistry</tspan></text>

  <!-- Chat messages -->
  <!-- AI msg 1 -->
  <rect x="16" y="164" width="260" height="80" rx="20" rx2="6" fill="url(#aiMsgGrad)"/>
  <rect x="16" y="164" width="260" height="80" rx="20" fill="none" stroke="#3a1880" stroke-width="1"/>
  <text x="32" y="186" fill="#a78bfa" font-family="Arial" font-size="11" font-weight="700">MKR AI</text>
  <text x="32" y="204" fill="#e2d9f3" font-family="Arial" font-size="13">Hello! I'm your AI study buddy.</text>
  <text x="32" y="222" fill="#e2d9f3" font-family="Arial" font-size="13">What can I help you learn today?</text>
  <text x="32" y="238" fill="#4a3570" font-family="Arial" font-size="10">9:30 AM</text>

  <!-- User msg 1 -->
  <rect x="114" y="256" width="260" height="64" rx="20" fill="url(#userMsgGrad)"/>
  <text x="130" y="278" fill="white" font-family="Arial" font-size="13">Explain esterification</text>
  <text x="130" y="296" fill="white" font-family="Arial" font-size="13">with an example</text>
  <text x="366" y="314" fill="rgba(255,255,255,0.5)" font-family="Arial" font-size="10" text-anchor="end">9:31 AM</text>

  <!-- AI msg 2 -->
  <rect x="16" y="332" width="310" height="160" rx="20" fill="url(#aiMsgGrad)"/>
  <rect x="16" y="332" width="310" height="160" rx="20" fill="none" stroke="#3a1880" stroke-width="1"/>
  <text x="32" y="354" fill="#a78bfa" font-family="Arial" font-size="11" font-weight="700">MKR AI ✨</text>
  <text x="32" y="375" fill="#e2d9f3" font-family="Arial" font-size="13" font-weight="700">Esterification:</text>
  <text x="32" y="393" fill="#c4b5fd" font-family="Arial" font-size="12">Acid + Alcohol → Ester + Water</text>
  <rect x="28" y="400" width="270" height="36" rx="10" fill="#12063a"/>
  <text x="163" y="418" fill="#a78bfa" font-family="Arial" font-size="12" font-family="monospace" text-anchor="middle">CH₃COOH + C₂H₅OH ⇌ CH₃COOC₂H₅ + H₂O</text>
  <text x="32" y="454" fill="#e2d9f3" font-family="Arial" font-size="12">E.g. Ethyl ethanoate smells</text>
  <text x="32" y="470" fill="#e2d9f3" font-family="Arial" font-size="12">like nail polish remover 💅</text>
  <text x="32" y="486" fill="#4a3570" font-family="Arial" font-size="10">9:31 AM</text>

  <!-- Quick actions row -->
  <text x="20" y="510" fill="#4a3570" font-family="Arial" font-size="11" text-anchor="middle">Quick Prompts:</text>
  <rect x="56" y="500" width="130" height="28" rx="14" fill="#1a0d30"/>
  <rect x="56" y="500" width="130" height="28" rx="14" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="121" y="518" fill="#a78bfa" font-family="Arial" font-size="11" text-anchor="middle">📚 Make flashcards</text>
  <rect x="196" y="500" width="130" height="28" rx="14" fill="#1a0d30"/>
  <rect x="196" y="500" width="130" height="28" rx="14" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="261" y="518" fill="#a78bfa" font-family="Arial" font-size="11" text-anchor="middle">🧪 Give me a quiz</text>

  <!-- User msg 2 -->
  <rect x="114" y="540" width="260" height="48" rx="20" fill="url(#userMsgGrad)"/>
  <text x="130" y="569" fill="white" font-family="Arial" font-size="13">Generate 5 flashcards on this</text>
  <text x="366" y="582" fill="rgba(255,255,255,0.5)" font-family="Arial" font-size="10" text-anchor="end">9:32 AM</text>

  <!-- AI typing -->
  <rect x="16" y="600" width="100" height="44" rx="20" fill="url(#aiMsgGrad)"/>
  <circle cx="40" cy="622" r="5" fill="#a78bfa"/>
  <circle cx="58" cy="622" r="5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="76" cy="622" r="5" fill="#a78bfa" opacity="0.4"/>

  <!-- Input bar -->
  <rect x="0" y="660" width="390" height="80" fill="#0f0b1e"/>
  <rect x="0" y="660" width="390" height="1" fill="#2a1555"/>
  <rect x="16" y="672" width="296" height="48" rx="24" fill="#1a0d30"/>
  <rect x="16" y="672" width="296" height="48" rx="24" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="40" y="700" fill="#4a3570" font-family="Arial" font-size="14">Ask anything about your topic…</text>
  <circle cx="350" cy="696" r="22" fill="url(#purpleBtn)"/>
  <text x="350" y="703" fill="white" font-family="Arial" font-size="20" text-anchor="middle">➤</text>

  <!-- Bottom Nav -->
  <rect x="0" y="756" width="390" height="88" fill="#0f0b1e"/>
  <rect x="0" y="756" width="390" height="1" fill="#2a1555"/>
  <rect x="24" y="760" width="342" height="56" rx="28" fill="#1a0d30"/>
  <rect x="24" y="760" width="342" height="56" rx="28" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="70" y="785" font-family="Arial" font-size="18" text-anchor="middle">🏠</text>
  <text x="70" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Home</text>
  <text x="133" y="785" font-family="Arial" font-size="18" text-anchor="middle">📚</text>
  <text x="133" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Cards</text>
  <text x="195" y="785" font-family="Arial" font-size="18" text-anchor="middle">📝</text>
  <text x="195" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Tests</text>
  <text x="257" y="785" font-family="Arial" font-size="18" text-anchor="middle">📊</text>
  <text x="257" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Stats</text>
  <text x="319" y="785" font-family="Arial" font-size="18" text-anchor="middle">⚙️</text>
  <text x="319" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Settings</text>
  <rect x="165" y="836" width="60" height="4" rx="2" fill="#3a2060"/>
</svg>
