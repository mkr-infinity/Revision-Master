<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0b1e"/>
      <stop offset="100%" stop-color="#12091a"/>
    </linearGradient>
    <linearGradient id="purpleBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f13ec"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cardFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e0a40"/>
      <stop offset="100%" stop-color="#2a106a"/>
    </linearGradient>
    <linearGradient id="greenBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="redBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#7f13ec" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#bgGrad)"/>

  <!-- Anime background glow -->
  <ellipse cx="195" cy="380" rx="180" ry="200" fill="#7f13ec" opacity="0.04"/>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0b1e"/>
  <text x="20" y="28" fill="#e2d9f3" font-family="Arial" font-size="13" font-weight="600">9:41</text>
  <text x="330" y="28" fill="#e2d9f3" font-family="Arial" font-size="11">●●● ▲ 84%</text>

  <!-- Header with back + title -->
  <rect x="0" y="44" width="390" height="60" fill="#0f0b1e"/>
  <text x="20" y="77" fill="#a78bfa" font-family="Arial" font-size="22">←</text>
  <text x="195" y="72" fill="white" font-family="Arial" font-size="17" font-weight="700" text-anchor="middle">Organic Chemistry</text>
  <text x="195" y="92" fill="#7c6fa8" font-family="Arial" font-size="12" text-anchor="middle">Card 5 of 18</text>
  <!-- More button -->
  <text x="370" y="77" fill="#a78bfa" font-family="Arial" font-size="20" text-anchor="middle">⋯</text>

  <!-- Progress bar -->
  <rect x="16" y="112" width="358" height="6" rx="3" fill="#2a1060"/>
  <rect x="16" y="112" width="99" height="6" rx="3" fill="url(#purpleBtn)"/>

  <!-- Streak / session info -->
  <rect x="16" y="128" width="100" height="28" rx="14" fill="#2a1060"/>
  <text x="66" y="146" fill="#a78bfa" font-family="Arial" font-size="11" font-weight="700" text-anchor="middle">🔥 3 Streak</text>
  <rect x="290" y="128" width="84" height="28" rx="14" fill="#1e0840"/>
  <text x="332" y="146" fill="#7c6fa8" font-family="Arial" font-size="11" text-anchor="middle">13 remaining</text>

  <!-- Flash card (front) -->
  <rect x="20" y="170" width="350" height="320" rx="28" fill="url(#cardFront)" filter="url(#cardShadow)"/>
  <!-- Card border glow -->
  <rect x="20" y="170" width="350" height="320" rx="28" fill="none" stroke="#7f13ec" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Halftone dots inside card -->
  <g opacity="0.1">
    <circle cx="48" cy="198" r="2" fill="#a855f7"/>
    <circle cx="62" cy="198" r="2" fill="#a855f7"/>
    <circle cx="48" cy="212" r="2" fill="#a855f7"/>
    <circle cx="62" cy="212" r="2" fill="#a855f7"/>
    <circle cx="326" cy="430" r="2" fill="#a855f7"/>
    <circle cx="340" cy="430" r="2" fill="#a855f7"/>
    <circle cx="354" cy="430" r="2" fill="#a855f7"/>
    <circle cx="326" cy="444" r="2" fill="#a855f7"/>
    <circle cx="340" cy="444" r="2" fill="#a855f7"/>
    <circle cx="354" cy="444" r="2" fill="#a855f7"/>
    <circle cx="326" cy="458" r="2" fill="#a855f7"/>
    <circle cx="340" cy="458" r="2" fill="#a855f7"/>
    <circle cx="354" cy="458" r="2" fill="#a855f7"/>
  </g>

  <!-- Card label -->
  <rect x="44" y="188" width="62" height="22" rx="11" fill="#2a1060"/>
  <text x="75" y="203" fill="#a78bfa" font-family="Arial" font-size="10" font-weight="700" text-anchor="middle">QUESTION</text>

  <!-- Card content -->
  <text x="195" y="290" fill="white" font-family="Arial" font-size="22" font-weight="800" text-anchor="middle">What is the IUPAC</text>
  <text x="195" y="318" fill="white" font-family="Arial" font-size="22" font-weight="800" text-anchor="middle">name for CH₃COOH?</text>

  <!-- Formula hint -->
  <rect x="100" y="340" width="190" height="48" rx="12" fill="#12063a"/>
  <rect x="100" y="340" width="190" height="48" rx="12" fill="none" stroke="#3a1a80" stroke-width="1"/>
  <text x="195" y="360" fill="#7c6fa8" font-family="Arial" font-size="11" text-anchor="middle">Carboxylic acid group:</text>
  <text x="195" y="378" fill="#c4b5fd" font-family="Arial" font-size="14" font-weight="700" text-anchor="middle">—COOH</text>

  <!-- Hint text -->
  <text x="195" y="432" fill="#7c6fa8" font-family="Arial" font-size="12" text-anchor="middle">Hint: Think vinegar 🍶</text>

  <!-- Tap to reveal -->
  <rect x="120" y="450" width="150" height="36" rx="18" fill="#7f13ec" opacity="0.2"/>
  <rect x="120" y="450" width="150" height="36" rx="18" fill="none" stroke="#7f13ec" stroke-width="1.5"/>
  <text x="195" y="473" fill="#a78bfa" font-family="Arial" font-size="13" font-weight="700" text-anchor="middle">Tap to Reveal ✨</text>

  <!-- Action buttons -->
  <text x="195" y="530" fill="#7c6fa8" font-family="Arial" font-size="12" text-anchor="middle">How well did you know this?</text>

  <rect x="16" y="544" width="106" height="52" rx="16" fill="#1a0a0a"/>
  <rect x="16" y="544" width="106" height="52" rx="16" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="69" y="568" font-family="Arial" font-size="20" text-anchor="middle">😓</text>
  <text x="69" y="586" fill="#ef4444" font-family="Arial" font-size="12" font-weight="700" text-anchor="middle">Forgot</text>

  <rect x="142" y="544" width="106" height="52" rx="16" fill="#1a0e08"/>
  <rect x="142" y="544" width="106" height="52" rx="16" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="195" y="568" font-family="Arial" font-size="20" text-anchor="middle">🤔</text>
  <text x="195" y="586" fill="#f97316" font-family="Arial" font-size="12" font-weight="700" text-anchor="middle">Blurry</text>

  <rect x="268" y="544" width="106" height="52" rx="16" fill="#06201a"/>
  <rect x="268" y="544" width="106" height="52" rx="16" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <text x="321" y="568" font-family="Arial" font-size="20" text-anchor="middle">💪</text>
  <text x="321" y="586" fill="#10b981" font-family="Arial" font-size="12" font-weight="700" text-anchor="middle">Got it!</text>

  <!-- Swipe hint -->
  <text x="195" y="622" fill="#4a3570" font-family="Arial" font-size="11" text-anchor="middle">← swipe left to skip · swipe right to mark known →</text>

  <!-- Bottom Nav -->
  <rect x="0" y="756" width="390" height="88" fill="#0f0b1e"/>
  <rect x="0" y="756" width="390" height="1" fill="#2a1555"/>
  <rect x="24" y="760" width="342" height="56" rx="28" fill="#1a0d30"/>
  <rect x="24" y="760" width="342" height="56" rx="28" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="70" y="785" font-family="Arial" font-size="18" text-anchor="middle">🏠</text>
  <text x="70" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Home</text>
  <rect x="112" y="764" width="80" height="48" rx="24" fill="url(#purpleBtn)"/>
  <text x="152" y="787" font-family="Arial" font-size="18" text-anchor="middle">📚</text>
  <text x="152" y="804" fill="white" font-family="Arial" font-size="9" font-weight="700" text-anchor="middle">Cards</text>
  <text x="214" y="785" font-family="Arial" font-size="18" text-anchor="middle">📝</text>
  <text x="214" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Tests</text>
  <text x="276" y="785" font-family="Arial" font-size="18" text-anchor="middle">📊</text>
  <text x="276" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Stats</text>
  <text x="338" y="785" font-family="Arial" font-size="18" text-anchor="middle">⚙️</text>
  <text x="338" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Settings</text>
  <rect x="165" y="836" width="60" height="4" rx="2" fill="#3a2060"/>
</svg>
