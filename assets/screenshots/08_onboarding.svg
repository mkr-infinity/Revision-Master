<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0b1e"/>
      <stop offset="100%" stop-color="#12091a"/>
    </linearGradient>
    <linearGradient id="purpleBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f13ec"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="pinkBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="glowCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7f13ec" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7f13ec" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="390" height="844" fill="url(#bgGrad)"/>

  <!-- Halftone dots background -->
  <g opacity="0.05">
    <circle cx="40" cy="120" r="3" fill="#a855f7"/>
    <circle cx="70" cy="120" r="3" fill="#a855f7"/>
    <circle cx="100" cy="120" r="3" fill="#a855f7"/>
    <circle cx="130" cy="120" r="3" fill="#a855f7"/>
    <circle cx="260" cy="120" r="3" fill="#a855f7"/>
    <circle cx="290" cy="120" r="3" fill="#a855f7"/>
    <circle cx="320" cy="120" r="3" fill="#a855f7"/>
    <circle cx="350" cy="120" r="3" fill="#a855f7"/>
    <circle cx="40" cy="150" r="3" fill="#a855f7"/>
    <circle cx="70" cy="150" r="3" fill="#a855f7"/>
    <circle cx="320" cy="150" r="3" fill="#a855f7"/>
    <circle cx="350" cy="150" r="3" fill="#a855f7"/>
  </g>

  <!-- Speed lines -->
  <g opacity="0.06" stroke="#7f13ec" stroke-width="1">
    <line x1="195" y1="300" x2="0" y2="100"/>
    <line x1="195" y1="300" x2="80" y2="60"/>
    <line x1="195" y1="300" x2="160" y2="50"/>
    <line x1="195" y1="300" x2="240" y2="50"/>
    <line x1="195" y1="300" x2="320" y2="60"/>
    <line x1="195" y1="300" x2="390" y2="100"/>
  </g>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0b1e"/>
  <text x="20" y="28" fill="#e2d9f3" font-family="Arial" font-size="13" font-weight="600">9:41</text>
  <text x="330" y="28" fill="#e2d9f3" font-family="Arial" font-size="11">●●● ▲ 84%</text>

  <!-- Skip button top right -->
  <text x="360" y="70" fill="#4a3570" font-family="Arial" font-size="13" font-weight="600" text-anchor="end">Skip</text>

  <!-- Chibi mascot illustration (geometric) -->
  <circle cx="195" cy="260" r="120" fill="#7f13ec" opacity="0.06"/>
  <circle cx="195" cy="260" r="80" fill="#7f13ec" opacity="0.06"/>

  <!-- Mascot body -->
  <ellipse cx="195" cy="290" rx="50" ry="60" fill="#2a1060"/>
  <!-- Mascot head -->
  <circle cx="195" cy="210" r="55" fill="#1a0840"/>
  <rect cx="195" cy="210" width="0" height="0"/>
  <!-- Face eyes -->
  <ellipse cx="176" cy="205" rx="9" ry="11" fill="white"/>
  <ellipse cx="214" cy="205" rx="9" ry="11" fill="white"/>
  <circle cx="178" cy="207" r="6" fill="#7f13ec"/>
  <circle cx="216" cy="207" r="6" fill="#7f13ec"/>
  <circle cx="180" cy="205" r="2" fill="white"/>
  <circle cx="218" cy="205" r="2" fill="white"/>
  <!-- Sparkle eyes -->
  <text x="176" y="200" fill="white" font-family="Arial" font-size="6" text-anchor="middle">★</text>
  <text x="214" y="200" fill="white" font-family="Arial" font-size="6" text-anchor="middle">★</text>
  <!-- Blush -->
  <ellipse cx="160" cy="222" rx="10" ry="6" fill="#ec4899" opacity="0.5"/>
  <ellipse cx="230" cy="222" rx="10" ry="6" fill="#ec4899" opacity="0.5"/>
  <!-- Smile -->
  <path d="M 180 228 Q 195 240 210 228" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hair spikes -->
  <path d="M 150 185 L 140 150 L 165 178" fill="#0f063a"/>
  <path d="M 165 172 L 162 138 L 183 168" fill="#0f063a"/>
  <path d="M 195 168 L 200 134 L 210 168" fill="#0f063a"/>
  <path d="M 218 172 L 232 142 L 228 175" fill="#0f063a"/>
  <!-- Uniform -->
  <rect x="160" y="248" width="70" height="80" rx="10" fill="#3a1880"/>
  <!-- Arms -->
  <ellipse cx="140" cy="280" rx="18" ry="28" fill="#2a1060"/>
  <ellipse cx="250" cy="280" rx="18" ry="28" fill="#2a1060"/>
  <!-- Holding book -->
  <rect x="230" y="270" width="34" height="26" rx="4" fill="#ec4899"/>
  <text x="247" y="287" fill="white" font-family="Arial" font-size="10" font-weight="700" text-anchor="middle">📖</text>

  <!-- Sparkles -->
  <text x="120" y="180" fill="#f59e0b" font-family="Arial" font-size="18">★</text>
  <text x="270" y="160" fill="#a855f7" font-family="Arial" font-size="14">✦</text>
  <text x="300" y="210" fill="#ec4899" font-family="Arial" font-size="12">✦</text>
  <text x="88" y="230" fill="#06b6d4" font-family="Arial" font-size="10">✦</text>

  <!-- Step indicator dots -->
  <circle cx="175" cy="370" r="6" fill="url(#purpleBtn)"/>
  <circle cx="195" cy="370" r="6" fill="url(#purpleBtn)"/>
  <circle cx="215" cy="370" r="4" fill="#2a1555"/>
  <circle cx="231" cy="370" r="4" fill="#2a1555"/>

  <!-- Main text -->
  <text x="195" y="410" fill="white" font-family="Arial" font-size="28" font-weight="900" text-anchor="middle">Study Like</text>
  <text x="195" y="444" font-family="Arial" font-size="28" font-weight="900" text-anchor="middle">
    <tspan fill="#a855f7">a Hero.</tspan>
  </text>
  <text x="195" y="480" fill="#7c6fa8" font-family="Arial" font-size="15" text-anchor="middle">The anime-themed study companion</text>
  <text x="195" y="500" fill="#7c6fa8" font-family="Arial" font-size="15" text-anchor="middle">built for serious students.</text>

  <!-- Feature badges -->
  <rect x="60" y="520" width="90" height="30" rx="15" fill="#1a0d30"/>
  <rect x="60" y="520" width="90" height="30" rx="15" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="105" y="539" fill="#a78bfa" font-family="Arial" font-size="11" font-weight="700" text-anchor="middle">📴 Offline</text>

  <rect x="160" y="520" width="80" height="30" rx="15" fill="#1a0d30"/>
  <rect x="160" y="520" width="80" height="30" rx="15" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="200" y="539" fill="#a78bfa" font-family="Arial" font-size="11" font-weight="700" text-anchor="middle">✨ AI</text>

  <rect x="250" y="520" width="80" height="30" rx="15" fill="#1a0d30"/>
  <rect x="250" y="520" width="80" height="30" rx="15" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="290" y="539" fill="#a78bfa" font-family="Arial" font-size="11" font-weight="700" text-anchor="middle">🆓 Free</text>

  <!-- CTA buttons -->
  <rect x="16" y="572" width="358" height="56" rx="28" fill="url(#purpleBtn)"/>
  <text x="195" y="605" fill="white" font-family="Arial" font-size="17" font-weight="800" text-anchor="middle">Get Started ⚡</text>

  <rect x="16" y="640" width="358" height="48" rx="24" fill="#1a0d30"/>
  <rect x="16" y="640" width="358" height="48" rx="24" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="195" y="669" fill="#7c6fa8" font-family="Arial" font-size="15" text-anchor="middle">I already have data → Restore</text>

  <!-- Home indicator -->
  <rect x="165" y="836" width="60" height="4" rx="2" fill="#3a2060"/>
</svg>
