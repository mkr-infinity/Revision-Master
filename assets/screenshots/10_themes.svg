  <text x="195" y="520" fill="white" font-family="Arial" font-size="11" font-weight="700" text-anchor="middle">Vinland</text>
  <text x="195" y="536" fill="rgba(255,255,255,0.6)" font-family="Arial" font-size="10" text-anchor="middle">Saga</text>
  <rect x="158" y="550" width="74" height="20" rx="10" fill="rgba(16,185,129,0.4)"/>
  <text x="195" y="563" fill="#6ee7b7" font-family="Arial" font-size="9" text-anchor="middle">Frost Teal</text>

