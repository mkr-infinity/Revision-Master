  <rect x="260" y="316" width="114" height="130" rx="20" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="317" y="356" font-family="Arial" font-size="30" text-anchor="middle">👁️</text>
  <text x="317" y="380" fill="white" font-family="Arial" font-size="11" font-weight="700" text-anchor="middle">Jujutsu</text>
  <text x="317" y="396" fill="rgba(255,255,255,0.6)" font-family="Arial" font-size="10" text-anchor="middle">Kaisen</text>
  <rect x="280" y="410" width="74" height="20" rx="10" fill="rgba(127,19,236,0.4)"/>
  <text x="317" y="423" fill="#c4b5fd" font-family="Arial" font-size="9" text-anchor="middle">Cursed Violet</text>

