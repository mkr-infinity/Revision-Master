  <text x="195" y="396" fill="rgba(255,255,255,0.6)" font-family="Arial" font-size="10" text-anchor="middle">Hokage</text>
  <rect x="158" y="410" width="74" height="20" rx="10" fill="rgba(249,115,22,0.4)"/>
