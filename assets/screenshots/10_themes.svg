  <text x="20" y="77" fill="#a78bfa" font-family="Arial" font-size="22">←</text>
  <text x="195" y="77" fill="white" font-family="Arial" font-size="20" font-weight="800" text-anchor="middle">Choose Your Theme</text>

  <!-- Sub heading -->
  <text x="195" y="116" fill="#7c6fa8" font-family="Arial" font-size="13" text-anchor="middle">Each theme is a full anime-world experience</text>

  <!-- Theme preview large (selected) -->
  <rect x="16" y="130" width="358" height="150" rx="24" fill="url(#demonSlayer)"/>
  <rect x="16" y="130" width="358" height="150" rx="24" fill="none" stroke="#ff3a5e" stroke-width="2"/>
  <!-- Checker pattern overlay -->
  <g opacity="0.15">
    <rect x="28" y="142" width="14" height="14" fill="#2dd17a"/>
    <rect x="56" y="142" width="14" height="14" fill="#2dd17a"/>
    <rect x="42" y="156" width="14" height="14" fill="#2dd17a"/>
    <rect x="70" y="156" width="14" height="14" fill="#2dd17a"/>
    <rect x="28" y="170" width="14" height="14" fill="#2dd17a"/>
