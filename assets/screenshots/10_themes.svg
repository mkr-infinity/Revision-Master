  <!-- Bleach -->
  <rect x="16" y="456" width="114" height="130" rx="20" fill="url(#bleach)"/>
  <rect x="16" y="456" width="114" height="130" rx="20" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="73" y="496" font-family="Arial" font-size="30" text-anchor="middle">⚡</text>
  <text x="73" y="520" fill="white" font-family="Arial" font-size="11" font-weight="700" text-anchor="middle">Bleach</text>
  <text x="73" y="536" fill="rgba(255,255,255,0.6)" font-family="Arial" font-size="10" text-anchor="middle">Zanpakuto</text>
