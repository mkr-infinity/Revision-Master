  <rect x="0" y="756" width="390" height="1" fill="#2a1555"/>
  <rect x="24" y="760" width="342" height="56" rx="28" fill="#1a0d30"/>
  <rect x="24" y="760" width="342" height="56" rx="28" fill="none" stroke="#2a1555" stroke-width="1"/>
  <text x="70" y="785" font-family="Arial" font-size="18" text-anchor="middle">🏠</text>
  <text x="70" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Home</text>
  <text x="133" y="785" font-family="Arial" font-size="18" text-anchor="middle">📚</text>
  <text x="133" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Cards</text>
  <text x="195" y="785" font-family="Arial" font-size="18" text-anchor="middle">📝</text>
  <text x="195" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Tests</text>
  <text x="257" y="785" font-family="Arial" font-size="18" text-anchor="middle">📊</text>
  <text x="257" y="802" fill="#7c6fa8" font-family="Arial" font-size="9" text-anchor="middle">Stats</text>
  <rect x="298" y="764" width="80" height="48" rx="24" fill="url(#purpleBtn)"/>
  <text x="338" y="787" font-family="Arial" font-size="18" text-anchor="middle">⚙️</text>
  <text x="338" y="804" fill="white" font-family="Arial" font-size="9" font-weight="700" text-anchor="middle">Settings</text>
  <rect x="165" y="836" width="60" height="4" rx="2" fill="#3a2060"/>
