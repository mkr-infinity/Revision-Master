<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0b1e"/>
      <stop offset="100%" stop-color="#12091a"/>
    </linearGradient>
    <linearGradient id="purpleBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f13ec"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Theme gradients -->
    <linearGradient id="demonSlayer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a0a14"/>
      <stop offset="100%" stop-color="#ff3a5e"/>
    </linearGradient>
    <linearGradient id="myHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1230"/>
      <stop offset="100%" stop-color="#1f6dff"/>
    </linearGradient>
    <linearGradient id="naruto" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1500"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="jjk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100820"/>
      <stop offset="100%" stop-color="#7f13ec"/>
    </linearGradient>
    <linearGradient id="bleach" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="vinland" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04181a"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect width="390" height="844" fill="url(#bgGrad)"/>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0b1e"/>
