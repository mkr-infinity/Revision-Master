  <text x="195" y="186" fill="white" font-family="Arial" font-size="28" font-weight="900" text-anchor="middle">⚔️ Demon Slayer</text>
  <text x="195" y="210" fill="rgba(255,255,255,0.7)" font-family="Arial" font-size="13" text-anchor="middle">Tanjiro · Crimson Red + Haori Checker</text>
