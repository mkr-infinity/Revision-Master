<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f13ec"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8ff"/>
      <stop offset="100%" stop-color="#fbeaff"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Rounded square background (anime / manga vibe) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Diagonal speed lines -->
  <g opacity="0.18" stroke="#fff" stroke-linecap="round" stroke-width="6">
    <line x1="40"  y1="120" x2="180" y2="60"/>
    <line x1="60"  y1="200" x2="220" y2="120"/>
    <line x1="320" y1="430" x2="470" y2="360"/>
    <line x1="300" y1="480" x2="450" y2="420"/>
  </g>

  <!-- Soft inner glow -->
  <ellipse cx="256" cy="256" rx="200" ry="180" fill="url(#glow)"/>

  <!-- Sparkle stars (manga shoujo aesthetic) -->
  <g fill="#fff">
    <path d="M120 100 l8 22 22 8 -22 8 -8 22 -8 -22 -22 -8 22 -8z" opacity="0.9"/>
    <path d="M420 120 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6z" opacity="0.85"/>
    <path d="M96  400 l5 14 14 5 -14 5 -5 14 -5 -14 -14 -5 14 -5z" opacity="0.7"/>
  </g>

  <!-- Open book -->
  <g transform="translate(256 268)">
    <!-- shadow -->
    <ellipse cx="0" cy="118" rx="160" ry="14" fill="#000" opacity="0.25" filter="url(#soft)"/>

    <!-- left page -->
    <path d="M-150 -90 Q -90 -110 -10 -78 L -10 96 Q -90 70 -150 90 Z"
          fill="url(#page)" stroke="#3a0a4a" stroke-width="6" stroke-linejoin="round"/>
    <!-- right page -->
    <path d="M150 -90 Q 90 -110 10 -78 L 10 96 Q 90 70 150 90 Z"
          fill="url(#page)" stroke="#3a0a4a" stroke-width="6" stroke-linejoin="round"/>

    <!-- spine -->
    <path d="M-12 -82 Q 0 -94 12 -82 L 12 92 Q 0 80 -12 92 Z"
          fill="url(#spine)" stroke="#3a0a4a" stroke-width="5" stroke-linejoin="round"/>

    <!-- Bold "RM" monogram on the pages -->
    <g font-family="'Bagel Fat One','Mochiy Pop One',system-ui,sans-serif"
       font-weight="900" fill="#3a0a4a" text-anchor="middle">
      <text x="-78" y="34" font-size="92">R</text>
      <text x="78"  y="34" font-size="92">M</text>
    </g>
  </g>

  <!-- Lightning spark (study energy) -->
  <path d="M340 70 l-44 78 32 6 -28 70 70 -86 -36 -8 30 -60z"
        fill="#fde047" stroke="#3a0a4a" stroke-width="6" stroke-linejoin="round"/>
</svg>
