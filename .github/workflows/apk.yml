name: Build Signed Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create env file for AI features
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Build web assets
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate adaptive launcher icons
        run: |
          if [ -f "resources/icon.png" ] || [ -f "resources/icon-foreground.png" ]; then
            npm install @capacitor/assets --no-save
            npx capacitor-assets generate --android
          else
            echo "::warning::No icon files found in resources/ — using default Capacitor icon."
          fi

      - name: Create dummy keystore
        run: |
          mkdir -p android/app
          keytool -genkeypair -v \
            -keystore android/app/dummy-release.jks \
            -alias dummy-release-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass dummy1234 \
            -keypass dummy1234 \
            -dname "CN=Dummy Release, OU=Testing, O=Revision Master, L=Web, S=Web, C=US"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-key.jks || true

      - name: Create keystore.properties
        run: |
          echo "storeFile=dummy-release.jks" > android/keystore.properties
          echo "storePassword=dummy1234" >> android/keystore.properties
          echo "keyAlias=dummy-release-key" >> android/keystore.properties
          echo "keyPassword=dummy1234" >> android/keystore.properties

      - name: Inject signing config into build.gradle
        run: node scripts/inject-signing.js

      - name: Build signed universal release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/dummy-release.jks \
            -Pandroid.injected.signing.store.password=dummy1234 \
            -Pandroid.injected.signing.key.alias=dummy-release-key \
            -Pandroid.injected.signing.key.password=dummy1234
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: List built APKs
        run: find android/app/build/outputs/apk -name "*.apk" | sort

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: revision-master-v2-signed
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
