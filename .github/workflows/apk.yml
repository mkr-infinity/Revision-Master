name: Build Dummy Signed Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create env file for AI features
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Build web assets
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create dummy keystore
        run: |
          mkdir -p android/app
          keytool -genkeypair -v \
            -keystore android/app/dummy-release.jks \
            -alias dummy-release-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass dummy1234 \
            -keypass dummy1234 \
            -dname "CN=Dummy Release, OU=Testing, O=Revision Master, L=Web, S=Web, C=US"

      - name: Build signed release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=app/dummy-release.jks \
            -Pandroid.injected.signing.store.password=dummy1234 \
            -Pandroid.injected.signing.key.alias=dummy-release-key \
            -Pandroid.injected.signing.key.password=dummy1234
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: List built APKs
        run: find android/app/build/outputs/apk -name "*.apk" | sort

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: revision-master-dummy-signed
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
