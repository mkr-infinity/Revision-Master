name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Create .env
      - name: Create .env
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      # 5️⃣ Build web app
      - name: Build web app
        run: npm run build

      # 6️⃣ Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # 7️⃣ Ensure Android project exists
      - name: Ensure Android platform exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 8️⃣ Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 9️⃣ Restore Keystore
      - name: Restore Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-key.jks

      # 🔟 Inject signing config into build.gradle
      - name: Configure Android signing
        run: |
          sed -i '/android {/a\
          signingConfigs {\n\
              release {\n\
                  storeFile file(System.getenv("SIGNING_STORE_FILE"))\n\
                  storePassword System.getenv("SIGNING_STORE_PASSWORD")\n\
                  keyAlias System.getenv("SIGNING_KEY_ALIAS")\n\
                  keyPassword System.getenv("SIGNING_KEY_PASSWORD")\n\
              }\n\
          }' android/app/build.gradle

          sed -i 's/buildTypes {/buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }/' android/app/build.gradle

      # 1️⃣1️⃣ Build signed APK
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          SIGNING_STORE_FILE: release-key.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # 1️⃣2️⃣ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: revision-master-apk
          path: android/app/build/outputs/apk/release/*.apk
